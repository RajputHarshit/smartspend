# App
spring.application.name=smartspend
server.port=8080

# MySQL - Java 21 + MySQL 8 config
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/smartspend?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:YOUR_MYSQL_PASSWORD_HERE}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
#JWT
jwt.secret=your-actual-secret-here
jwt.expiration=86400000
#Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

#Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:909

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=smartspend-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.harshit.smartspend.dto
#Gemini
spring.ai.google.genai.api-key=YOUR_GEMINI_API_KEY_HERE