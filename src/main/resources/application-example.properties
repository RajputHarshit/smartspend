# App
spring.application.name=smartspend
server.port=8080

# MySQL - Java 17 + MySQL 8 config
spring.datasource.url=jdbc:mysql://localhost:3306/smartspend?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD_HERE
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
#JWT
jwt.secret=your-actual-secret-here
jwt.expiration=86400000

#Gemini
spring.ai.google.genai.api-key=YOUR_GEMINI_API_KEY_HERE